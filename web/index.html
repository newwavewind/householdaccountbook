<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- GitHub Pages SPA redirect restore -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var url = new URL(redirect);
          window.history.replaceState(null, '', url.pathname + url.search + url.hash);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MJ가계부 — 수입·지출을 간편하게 기록하는 가계부 앱입니다."
    />
    <script>
      (function () {
        try {
          var k = 'mj-gaegyeobu-theme-v1';
          var p = localStorage.getItem(k);
          var systemDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          var dark = p === 'dark' || (p !== 'light' && systemDark);
          if (dark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {}
      })();
    </script>
    <meta name="application-name" content="MJ가계부" />
    <meta name="theme-color" content="#f2f0eb" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MJ가계부" />
    <meta name="msapplication-TileColor" content="#f2f0eb" />
    <link rel="apple-touch-icon" href="/pwa-192.png" sizes="180x180" />
    <title>MJ가계부</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
