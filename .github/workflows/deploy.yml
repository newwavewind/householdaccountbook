# GitHub Pages 빌드에 Supabase·장부용 Vite 환경 변수를 넣으려면 Repository secrets:
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# 선택: VITE_GOOGLE_CLIENT_ID (GIS 팝업 로그인 시)
# 선택: VITE_KAKAO_JAVASCRIPT_KEY (달력 메모 카카오톡 공유 — 없으면 Web Share/클립보드)
# 로컬에서 한 번에 올리기: node scripts/push-github-pages-secrets.mjs  (gh auth login 후)
# Vercel Production(web 프로젝트)은 이 워크플로와 별개 — main 푸시 시 Vercel 대시보드 Git 연동으로 배포됨.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Verify Supabase secrets (Pages 빌드)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Actions secrets 에 VITE_SUPABASE_URL 과 VITE_SUPABASE_ANON_KEY 를 추가하세요."
            echo "Settings → Secrets and variables → Actions → New repository secret"
            echo "또는 로컬: node scripts/push-github-pages-secrets.mjs"
            exit 1
          fi
          case "$VITE_SUPABASE_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::VITE_SUPABASE_URL 은 http:// 또는 https:// 로 시작해야 합니다."
              exit 1
              ;;
          esac

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_BASE_PATH: /householdaccountbook/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LEDGER_BACKEND: supabase
          VITE_COMMUNITY_BACKEND: supabase
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_KAKAO_JAVASCRIPT_KEY: ${{ secrets.VITE_KAKAO_JAVASCRIPT_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
